services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: talentos-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - talentos
    depends_on:
      - mysql
      - mailpit

  nginx:
    image: nginx:alpine
    container_name: talentos-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - talentos
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: talentos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: banco_talentos
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - talentos

  mailpit:
    image: axllent/mailpit:latest
    container_name: talentos-mail
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - talentos

networks:
  talentos:
    driver: bridge

volumes:
  mysql-data:
